{% extends "base.html" %}

{% block title %}Pulse Horses - Today's Racecards{% endblock %}

{% block content %}
<h1>TEST PAGE</h1>

<p>Racecards: {{ racecards|length }}</p>

{% for card in racecards %}
    <p>{{ card.course }} - {{ card.races|length }}</p>
{% endfor %}

</div>

<script>
    const accordions = document.querySelectorAll(".racecourse-accordion");

    accordions.forEach((accordion) => {
        accordion.addEventListener("toggle", () => {
            if (accordion.open) {
                accordions.forEach((other) => {
                    if (other !== accordion) {
                        other.open = false;
                    }
                });
            }
        });
    });
</script>

{% endblock %}
