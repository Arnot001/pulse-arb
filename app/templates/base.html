<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Pulse IQ{% endblock %}</title>

    <link rel="stylesheet" href="/static/styles.css">

    {% block head %}{% endblock %}
</head>

<body>

<div class="pulse-layout">

    <aside class="pulse-sidebar">

        <div class="pulse-logo">
            <h2>🧠 Pulse IQ</h2>
            <div class="pulse-tagline">
                Collect first.<br>
                Learn forever.
            </div>
        </div>

        <nav class="pulse-nav">

            <a href="/" class="{% if active_page == 'home' %}active{% endif %}">
                <img src="/static/icons/home.png" class="nav-icon" alt="">
                <span>Home</span>
            </a>

            <a href="/horses" class="{% if active_page == 'horses' %}active{% endif %}">
                <img src="/static/icons/horses.png" class="nav-icon" alt="">
                <span>Horses</span>
            </a>

            <a href="/dogs" class="{% if active_page == 'dogs' %}active{% endif %}">
                <img src="/static/icons/dogs.png" class="nav-icon" alt="">
                <span>Dogs</span>
            </a>

            <a href="/football" class="{% if active_page == 'football' %}active{% endif %}">
                <img src="/static/icons/football.png" class="nav-icon" alt="">
                <span>Football</span>
            </a>

            <a href="/arb" class="{% if active_page == 'arb' %}active{% endif %}">
                <img src="/static/icons/arb.png" class="nav-icon" alt="">
                <span>Pulse Arb</span>
            </a>

            <a href="/horses/performance">
                <img src="/static/icons/performance.png" class="nav-icon" alt="">
                <span>Performance</span>
            </a>

            <a href="/strategy" class="{% if active_page == 'strategy' %}active{% endif %}">
                <img src="/static/icons/strategy.png" class="nav-icon" alt="">
                <span>Strategy Lab</span>
            </a>

            <a href="/horses/market-events">
                <img src="/static/icons/market.png" class="nav-icon" alt="">
                <span>Market Intelligence</span>
            </a>

            <a href="/horses/races">
                <img src="/static/icons/races.png" class="nav-icon" alt="">
                <span>Today's Races</span>
            </a>

        </nav>

    </aside>

    <main class="pulse-content">

        {% block content %}
        {% endblock %}

    </main>

</div>

{% block scripts %}
{% endblock %}

</body>
</html>
